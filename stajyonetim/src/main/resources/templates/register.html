<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ol - Ankara BT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="width: 400px;">
  <h3 class="text-center mb-4">Hesap Oluştur</h3>
  <form action="/kayit-ol" method="post">
    <input type="text" name="ad" class="form-control mb-3" placeholder="Adınız" required>
    <input type="text" name="soyad" class="form-control mb-3" placeholder="Soyadınız" required>
    <input type="email" name="eposta" class="form-control mb-3" placeholder="E-posta Adresi" required>
    <input type="text" name="telefon" class="form-control mb-3" placeholder="Telefon (Opsiyonel)">
    <input type="password" name="sifre" class="form-control mb-3" placeholder="Şifre" required>
    <button type="submit" class="btn btn-primary w-100">Kayıt Ol</button>
  </form>
  <div class="text-center mt-3">
    <a href="/giris">Zaten hesabın var mı? Giriş yap</a>
  </div>
</div>

</body>
</html>
