<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Ankara BT - Staj Yönetim Giriş</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    .form-control {
      background: rgba(255, 255, 255, 0.9);
      border: none;
      height: 50px;
      margin-bottom: 20px;
    }
    .btn-custom {
      background: #4facfe;
      border: none;
      height: 50px;
      width: 100%;
      font-weight: 600;
      color: white;
      transition: all 0.3s;
    }
    .btn-custom:hover {
      background: #00f2fe;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
    }
    .logo-text {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="glass-card">
  <div class="logo-text">
    <h3>ANKARA BT</h3>
    <p style="font-weight: 300; font-size: 14px; opacity: 0.8;">STAJ YÖNETİM SİSTEMİ</p>
  </div>
  <form action="/giris-yap" method="post">
    <input type="email" name="eposta" class="form-control" placeholder="E-posta Adresi">
    <input type="password" name="sifre" class="form-control" placeholder="Şifre">
    <button type="submit" class="btn btn-custom rounded-pill">Giriş Yap</button>
  </form>
  <div class="text-center mt-3">
    <a href="#" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px;">Şifremi Unuttum?</a>
  </div>
</div>

</body>
</html>
